<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#222;font-size:14px;overscroll-behavior:none;touch-action:pan-y}
html{overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
body{padding-bottom:80px;min-height:100vh;overscroll-behavior-y:none}
.header{background:#D85A30;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.header-logo{width:44px;height:44px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#D85A30;font-weight:800;font-size:14px;flex-shrink:0;overflow:hidden;padding:4px}
.header-logo img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.header-info{flex:1;min-width:0}
.header-title{font-size:14px;font-weight:700;line-height:1.2}
.header-sub{font-size:12px;opacity:.85;line-height:1.2;margin-top:2px}
.header-badge{font-size:11px;background:rgba(255,255,255,.22);padding:4px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.back-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tabs{background:#fff;display:flex;align-items:center;gap:6px;padding:14px 14px 12px;border-bottom:1px solid #eee;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-height:56px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;font-size:13px;line-height:1.2;border-radius:18px;border:1px solid #e5e5e0;background:#fff;color:#666;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center}
.tab.active{background:#D85A30;color:#fff;border-color:#D85A30}
.content{padding:14px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .1s}
.card:active{transform:scale(.985)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-num{font-size:13px;font-weight:800;color:#D85A30;letter-spacing:.02em}
.badge{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:700;letter-spacing:.02em}
.badge.hoy{background:#FAEEDA;color:#854F0B}
.badge.pendiente{background:#fcebeb;color:#791F1F}
.badge.en-proceso{background:#E6F1FB;color:#0C447C}
.badge.completado{background:#EAF3DE;color:#27500A}
.card-cliente{font-size:15px;font-weight:700;margin-bottom:4px;color:#222}
.card-ubi{font-size:12px;color:#666;margin-bottom:8px;display:flex;align-items:flex-start;gap:4px;line-height:1.35}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:600}
.tag.blue{background:#E6F1FB;color:#0C447C}
.tag.green{background:#EAF3DE;color:#27500A}
.tag.amber{background:#FAEEDA;color:#854F0B}
.empty{text-align:center;padding:50px 20px;color:#888}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:14px;line-height:1.5}
.login-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 24px;background:#fff}
.login-logo{width:80px;height:80px;background:#D85A30;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:24px;margin:0 auto 20px}
.login-title{text-align:center;font-size:22px;font-weight:800;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:#888;margin-bottom:30px}
.login-form{max-width:340px;margin:0 auto;width:100%}
.login-label{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.login-input{width:100%;padding:14px;border:2px solid #e5e5e0;border-radius:10px;font-size:18px;font-family:inherit;margin-bottom:14px;text-align:center;letter-spacing:.05em;-webkit-appearance:none}
.login-input:focus{outline:none;border-color:#D85A30}
.login-btn{width:100%;padding:14px;background:#D85A30;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login-btn:active{background:#b94725}
.login-err{background:#fcebeb;color:#791F1F;padding:10px;border-radius:8px;font-size:12px;text-align:center;margin-bottom:12px}
.detail-screen{padding:14px}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.action-btn{padding:12px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;border:none;font-family:inherit}
.action-btn.maps{background:#185FA5;color:#fff}
.action-btn.wa{background:#25D366;color:#fff}
.info-box{background:#f9f9f7;border-radius:10px;padding:12px;margin-bottom:12px}
.info-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:6px}
.info-val{font-size:14px;font-weight:600;margin-bottom:2px}
.info-sub{font-size:12px;color:#666}
.planos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.plano-thumb{aspect-ratio:1;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#888;cursor:pointer;overflow:hidden;position:relative}
.plano-thumb img{width:100%;height:100%;object-fit:cover}
.plano-thumb.pdf{background:#f3eef8;color:#7c5cbf}
.actions-section{border-top:1px solid #eee;padding-top:14px;margin-top:6px}
.section-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:10px}
.btn-full{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;border:1.5px solid}
.btn-foto{background:#fff;border-color:#185FA5;color:#185FA5}
.btn-pdf{background:#fff;border-color:#3B6D11;color:#3B6D11}
.btn-entregado{background:#3B6D11;border-color:#3B6D11;color:#fff;font-size:15px;padding:15px}
.btn-foto:active,.btn-pdf:active{background:#f9f9f7}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#222;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:600;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-img{max-width:100%;max-height:90vh;border-radius:8px}
.firma-fullscreen{position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column}
.firma-fs-bar{background:#D85A30;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.firma-fs-bar h3{margin:0;font-size:14px;font-weight:700;flex:1}
.firma-fs-bar button{background:rgba(255,255,255,.18);border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.firma-fs-bar button.primary{background:#fff;color:#D85A30}
.firma-fs-canvas-wrap{flex:1;padding:10px;display:flex;flex-direction:column}
.firma-fs-canvas-wrap canvas{flex:1;border:2px dashed #b5cce8;border-radius:8px;background:#fff;touch-action:none;width:100%}
.firma-fs-hint{font-size:12px;color:#888;text-align:center;padding:6px}
.modal-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.2);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fotos-list{margin-top:8px}
.foto-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0f7ff;border:1px solid #b5cce8;border-radius:8px;margin-bottom:5px;font-size:12px}
.foto-chip-name{flex:1;color:#185FA5;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#D85A30;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.offline-banner{background:#FAEEDA;color:#854F0B;padding:8px 14px;font-size:12px;text-align:center;font-weight:600}
.refresh-btn{position:fixed;bottom:24px;right:24px;width:54px;height:54px;background:#D85A30;color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(216,90,48,.4);z-index:50}
.refresh-btn:active{transform:scale(.95)}
.refresh-btn.spinning{animation:spin 1s linear infinite}
</style>
</head>

// Lista completa (base + extras de Configuración de Empresa)
let INSTALADORES={...INSTALADORES_BASE};

// Carga instaladores EXTRA desde Supabase (los que se agregan desde Configuración)
async function cargarInstaladoresExtras(){
  try{
    const {data,error}=await sb.from('empresa_config').select('*').eq('clave','instaladores').single();
    if(error||!data)return;
    let lista=[];
    try{
      lista=typeof data.valor==='string'?JSON.parse(data.valor):(data.valor||[]);
    }catch(e){return;}
    if(!Array.isArray(lista))return;
    lista.forEach(ins=>{
      if(!ins.nombre||!ins.tel)return;
      const tel=String(ins.tel).replace(/\D/g,'');
      if(tel.length!==10)return;
      // Si ya está en BASE, no sobrescribir
      if(INSTALADORES_BASE[tel])return;
      // Código automático = últimos 4 dígitos del teléfono
      const codigo=tel.slice(-4);
      // Iniciales de las palabras del nombre
      const palabras=ins.nombre.trim().split(/\s+/);
      const iniciales=(palabras[0][0]+(palabras[1]?palabras[1][0]:'')||'').toUpperCase();
      INSTALADORES[tel]={nombre:ins.nombre,codigo,iniciales};
    });
    console.log('✓ Instaladores cargados:',Object.keys(INSTALADORES).length);
  }catch(e){console.warn('Error cargando instaladores extras:',e);}
}

let state={
  user:null,
  pedidos:[],
  filtro:'hoy',
  vista:'lista',
  pedidoSel:null
};

function $(id){return document.getElementById(id);}
function getApp(){return $('app');}

function toast(msg,color){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  if(color)t.style.background=color;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function guardarSesion(cel){localStorage.setItem('isa_inst_user',cel);}
function cargarSesion(){return localStorage.getItem('isa_inst_user');}
function cerrarSesion(){localStorage.removeItem('isa_inst_user');state.user=null;state.pedidos=[];state.pedidoSel=null;state.vista='login';render();}

function fmtFecha(f){if(!f)return'—';try{const d=new Date(f);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});}catch(e){return f;}}
function esHoy(f){if(!f)return false;try{const d=new Date(f);const hoy=new Date();return d.toDateString()===hoy.toDateString();}catch(e){return false;}}

function esModoAlmacen(){return !!(INSTALADORES[state.user]&&INSTALADORES[state.user].esAlmacen);}

async function cargarPedidos(){
  if(!state.user)return;
  try{
    // Siempre lee TODO y filtra por payload (mas confiable, evita problemas de columna)
    const {data,error}=await sb.from('orders').select('*').order('updated_at',{ascending:false});
    if(error)throw error;
    console.log('Total pedidos en nube:',data?.length||0);
    const todos=(data||[]).map(r=>{
      try{
        if(r.payload){
          const p=typeof r.payload==='string'?JSON.parse(r.payload):r.payload;
          return p;
        }
        return r;
      }catch(e){console.warn('Error parsing payload:',e);return r;}
    });
    state.pedidos=todos.filter(o=>{
      if(!o)return false;
      if(o.estatus==='Completado'||o.estatus==='Cancelado')return false;
      // Almacén ve TODOS los pedidos activos; instaladores solo los suyos
      if(esModoAlmacen())return true;
      return o.instaladorCel===state.user;
    });
    console.log(esModoAlmacen()?'Modo ALMACÉN - todos los pedidos:':'Pedidos del instalador '+state.user+':',state.pedidos.length);
    render();
  }catch(e){
    console.error('Error cargando:',e);
    toast('⚠ Error al cargar: '+e.message,'#c62828');
  }
}

function hacerLogin(){
  const tel=($('login-tel').value||'').trim().replace(/\D/g,'');
  const cod=($('login-cod').value||'').trim();
  if(tel.length!==10){state.loginErr='El celular debe tener 10 dígitos';render();return;}
  if(cod.length!==4){state.loginErr='El código debe tener 4 dígitos';render();return;}
  const ins=INSTALADORES[tel];
  if(!ins){state.loginErr='Celular no registrado. Habla con la oficina.';state.tel=tel;render();return;}
  if(ins.codigo!==cod){state.loginErr='Código incorrecto';state.tel=tel;render();return;}
  state.loginErr=null;
  state.tel=null;
  state.user=tel;
  guardarSesion(tel);
  state.vista='lista';
  render();
  cargarPedidos().then(()=>{
    if(state.pedidoPendiente){const p=state.pedidoPendiente;state.pedidoPendiente=null;_abrirPedidoDirecto(p);}
  });
}

function abrirEntregaRecepcion(){
  const o=state.pedidoSel;if(!o){toast('Sin pedido','#c62828');return;}
  const ins=INSTALADORES[state.user]||{};
  
  // Construir URL con datos del pedido para la app de Daniel
  const params=new URLSearchParams();
  if(o.num)params.set('pedido',o.num);
  if(o.cliente)params.set('cliente',o.cliente);
  if(o.contactoNombre)params.set('contacto',o.contactoNombre);
  if(o.ubicacion)params.set('ubicacion',o.ubicacion);
  if(o.comercial)params.set('comercial',o.comercial);
  if(o.fecha)params.set('fecha',o.fecha);
  if(o.entrega)params.set('entrega',o.entrega);
  if((o.sistemas||[]).length)params.set('sistemas',(o.sistemas||[]).join(','));
  if(ins.nombre)params.set('instalador',ins.nombre);
  // Marcar instalación si trae sistemas que no sean solo entrega
  const sistemasStr=(o.sistemas||[]).join(',').toLowerCase();
  const llevaInstalacion=sistemasStr&&sistemasStr!=='entrega';
  if(llevaInstalacion)params.set('tipo','instalacion');
  else params.set('tipo','entrega');
  
  // PDF del pedido — si hay URL pública, mandarla para que abra "Ver pedido"
  if(o.pdfsPresupuesto && o.pdfsPresupuesto.length){
    const p=o.pdfsPresupuesto[0];
    const fuente=p.url||p.data||'';
    if(fuente.startsWith('http'))params.set('pdf_url',fuente);
  }
  
  const url='https://isarack-entrega-recepcion.vercel.app/?'+params.toString();
  window.open(url,'_blank');
}

function abrirFirmaFullscreen(){
  // Crear modal fullscreen
  const m=document.createElement('div');
  m.className='firma-fullscreen';
  m.id='firma-modal';
  m.innerHTML=`
    <div class="firma-fs-bar">
      <button onclick="cerrarFirmaFullscreen(false)">← Cancelar</button>
      <h3>Firma del cliente</h3>
      <button onclick="limpiarFirmaFS()">🧹 Borrar</button>
      <button class="primary" onclick="cerrarFirmaFullscreen(true)">✓ Listo</button>
    </div>
    <div class="firma-fs-canvas-wrap">
      <canvas id="firma-fs-canvas"></canvas>
      <div class="firma-fs-hint">Gira el celular para más espacio · Firma con el dedo</div>
    </div>`;
  document.body.appendChild(m);
  
  // Bloquear scroll del body
  document.body.style.overflow='hidden';
  
  // Inicializar SignaturePad en el canvas grande
  setTimeout(()=>{
    const canvas=document.getElementById('firma-fs-canvas');
    const ratio=Math.max(window.devicePixelRatio||1,1);
    canvas.width=canvas.offsetWidth*ratio;
    canvas.height=canvas.offsetHeight*ratio;
    canvas.getContext('2d').scale(ratio,ratio);
    state.firma.signaturePadFS=new SignaturePad(canvas,{
      backgroundColor:'rgba(255,255,255,0)',
      penColor:'#0a0a0a',
      minWidth:1.5,
      maxWidth:3
    });
    // Si ya había firma previa, cargarla
    if(state.firma.dataURL){
      const img=new Image();
      img.onload=()=>canvas.getContext('2d').drawImage(img,0,0,canvas.offsetWidth,canvas.offsetHeight);
      img.src=state.firma.dataURL;
    }
  },50);
}

async function guardarFirma(){
  const o=state.pedidoSel;if(!o){toast('Sin pedido','#c62828');return;}
  const nombre=(document.getElementById('firma-nombre').value||'').trim();
  const obs=(document.getElementById('firma-obs').value||'').trim();
  if(!nombre){toast('⚠ Falta nombre','#c62828');return;}
  if(!state.firma.dataURL){toast('⚠ Falta firma. Toca "Firmar en pantalla completa"','#c62828');return;}
  
  toast('⏳ Generando PDF...','#185FA5');
  try{
    const firmaDataURL=state.firma.dataURL;
    const pdfBlob=await generarPdfFirma(o,nombre,obs,firmaDataURL);
    
    // Subir PDF a Supabase Storage
    const ts=Date.now();
    const path=o.num+'/entregas/'+ts+'_firma_'+limpiarNombre(nombre)+'.pdf';
    const {error}=await sb.storage.from('planos').upload(path,pdfBlob,{contentType:'application/pdf'});
    if(error){console.error(error);toast('⚠ Error: '+error.message,'#c62828');return;}
    const {data:urlData}=sb.storage.from('planos').getPublicUrl(path);
    
    // Guardar en pdfsRecepcion (zona verde de ISA-OS)
    const pdfRec={
      name:'Firma_'+nombre+'.pdf',
      data:urlData.publicUrl,
      tipo:'application/pdf',
      size:pdfBlob.size,
      fecha:new Date().toISOString(),
      subidoPor:INSTALADORES[state.user].nombre,
      storagePath:path,
      firmadoPor:nombre,
      observaciones:obs
    };
    if(!o.pdfsRecepcion)o.pdfsRecepcion=[];
    o.pdfsRecepcion.push(pdfRec);
    o.estatus='Completado';
    o.entregado='Si';
    o.armado='Listo';
    o.instalacion='Listo';
    await guardarPedido(o);
    
    toast('✓ Entrega registrada','#3B6D11');
    state.pedidos=state.pedidos.filter(x=>x.num!==o.num);
    setTimeout(()=>volverLista(),800);
  }catch(e){
    console.error(e);
    toast('⚠ Error: '+e.message,'#c62828');
  }
}

async function generarPdfFirma(o,nombre,obs,firmaDataURL){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'letter'});
  const W=216,M=15;
  let y=20;
  
  // Encabezado naranja
  doc.setFillColor(216,90,48);
  doc.rect(0,0,W,28,'F');
  doc.setTextColor(255);
  doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('ISARACK',M,15);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Comprobante de entrega',M,22);
  y=40;
  
  // Datos del pedido
  doc.setTextColor(0);
  doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('Datos del pedido',M,y);y+=2;
  doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=7;
  
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  const datos=[
    ['Pedido:',o.num||'—'],
    ['Cliente:',o.cliente||'—'],
    ['Ubicación:',o.ubicacion||'—'],
    ['Fecha entrega:',new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'})],
    ['Instalador:',INSTALADORES[state.user].nombre]
  ];
  datos.forEach(d=>{
    doc.setFont('helvetica','bold');doc.text(d[0],M,y);
    doc.setFont('helvetica','normal');
    const lines=doc.splitTextToSize(d[1],W-M-40);
    doc.text(lines,M+35,y);
    y+=Math.max(6,lines.length*5);
  });
  
  y+=4;
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('Recepción',M,y);y+=2;
  doc.line(M,y,W-M,y);y+=7;
  
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');doc.text('Recibe:',M,y);
  doc.setFont('helvetica','normal');doc.text(nombre,M+35,y);y+=8;
  
  if(obs){
    doc.setFont('helvetica','bold');doc.text('Observaciones:',M,y);y+=5;
    doc.setFont('helvetica','normal');
    const obsLines=doc.splitTextToSize(obs,W-2*M);
    doc.text(obsLines,M,y);y+=obsLines.length*5+4;
  }
  
  // Firma
  y+=6;
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text('Firma del cliente',M,y);y+=2;
  doc.line(M,y,W-M,y);y+=4;
  
  try{
    doc.addImage(firmaDataURL,'PNG',M,y,80,40);
  }catch(e){console.error('Firma error:',e);}
  y+=42;
  doc.line(M,y,M+80,y);y+=4;
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text(nombre,M,y);
  
  // Pie de página
  doc.setFontSize(8);doc.setTextColor(150);
  doc.text('Documento generado por ISARACK Instaladores · '+new Date().toLocaleString('es-MX'),M,260);
  
  return doc.output('blob');
}

let _visorBlobUrl=null;
function mostrarVisorPDF(src,titulo){
  cerrarVisorPDF(); // limpiar si había uno previo
  const ov=document.createElement('div');
  ov.id='visor-pdf-overlay';
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:#fff;display:flex;flex-direction:column';
  ov.innerHTML=
    '<div style="flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 14px;background:#da6635;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15)">'+
      '<button onclick="cerrarVisorPDF()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:16px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;font-family:inherit">← Volver</button>'+
      '<span style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(titulo||'Documento')+'</span>'+
    '</div>'+
    '<iframe src="'+src+'" style="flex:1;width:100%;border:none" title="'+(titulo||'Documento')+'"></iframe>';
  _abrirOverlayVisor(ov);
}
function mostrarVisorHTML(htmlContent,titulo){
  cerrarVisorPDF();
  const ov=document.createElement('div');
  ov.id='visor-pdf-overlay';
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:#fff;display:flex;flex-direction:column';
  const barra='<div style="flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 14px;background:#da6635;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15)">'+
      '<button onclick="cerrarVisorPDF()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:16px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;font-family:inherit">← Volver</button>'+
      '<span style="font-size:15px;font-weight:700">'+(titulo||'Cotización')+'</span></div>';
  // La cotización tiene ancho fijo (780px). En móvil hay que escalarla para que quepa completa.
  const anchoCot=780;
  const anchoDisp=Math.min(window.innerWidth, document.documentElement.clientWidth)||window.innerWidth;
  const escala=Math.min(1,(anchoDisp-20)/anchoCot);
  const wrapper='<div style="flex:1;overflow:auto;background:#e8e8e5;padding:10px 0;text-align:center">'+
      '<div id="cot-scale-wrap" style="display:inline-block;transform:scale('+escala.toFixed(4)+');transform-origin:top center;width:'+anchoCot+'px">'+htmlContent+'</div></div>';
  ov.innerHTML=barra+wrapper;
  // Ajustar altura tras render para que no quede hueco por el scale
  setTimeout(()=>{const w=document.getElementById('cot-scale-wrap');if(w){const realH=w.getBoundingClientRect().height;w.parentElement.style.height=(realH+20)+'px';}},60);
  _abrirOverlayVisor(ov);
}
function _abrirOverlayVisor(ov){
  document.body.appendChild(ov);
  document.body.style.overflow='hidden';
  // El botón atrás de Android/celular cierra el visor en vez de salir de la app
  try{history.pushState({visorPDF:true},'');window.addEventListener('popstate',_cerrarVisorPorBack);}catch(e){}
}
function cerrarVisorPDF(){
  const ov=document.getElementById('visor-pdf-overlay');
  if(ov)ov.remove();
  document.body.style.overflow='';
  if(_visorBlobUrl){URL.revokeObjectURL(_visorBlobUrl);_visorBlobUrl=null;}
  window.removeEventListener('popstate',_cerrarVisorPorBack);
}
function _cerrarVisorPorBack(){
  const ov=document.getElementById('visor-pdf-overlay');
  if(ov){ov.remove();document.body.style.overflow='';if(_visorBlobUrl){URL.revokeObjectURL(_visorBlobUrl);_visorBlobUrl=null;}}
  window.removeEventListener('popstate',_cerrarVisorPorBack);
}

function abrirPdfPresupuesto(idx){
  const o=state.pedidoSel;
  if(!o){toast('PDF no encontrado','#c62828');return;}
  
  // Caso 1: hay PDFs en pdfsPresupuesto
  if(o.pdfsPresupuesto&&o.pdfsPresupuesto[idx]){
    const p=o.pdfsPresupuesto[idx];
    const fuente=p.data||p.url||'';
    if(!fuente){toast('PDF sin datos','#c62828');return;}
    
    // Si es URL pública, mostrar en visor dentro de la app
    if(fuente.startsWith('http')){
      mostrarVisorPDF(fuente,(o.num||'Pedido')+' — PDF');
      return;
    }
    
    // Si es base64 data URI, convertir a Blob y mostrar en visor
    if(fuente.startsWith('data:')){
      try{
        const arr=fuente.split(',');
        const mime=arr[0].match(/:(.*?);/)[1];
        const bstr=atob(arr[1]);
        let n=bstr.length;
        const u8arr=new Uint8Array(n);
        while(n--)u8arr[n]=bstr.charCodeAt(n);
        const blob=new Blob([u8arr],{type:mime});
        const blobUrl=URL.createObjectURL(blob);
        _visorBlobUrl=blobUrl;
        mostrarVisorPDF(blobUrl,(o.num||'Pedido')+' — PDF');
      }catch(e){
        console.error(e);
        toast('Error abriendo PDF','#c62828');
      }
      return;
    }
  }
  
  // Caso 2: hay cotHTML (cotización en HTML)
  if(o.cotHTML){
    let htmlStr=o.cotHTML;
    const eraObjeto=(typeof htmlStr==='object'&&htmlStr!==null);
    if(eraObjeto)htmlStr=htmlStr.html||'';
    // Si cotHTML vino dañado (objeto) y tenemos cotData, mejor regenerar limpio desde cotData.
    if(eraObjeto&&o.cotData&&typeof generarCotHTML==='function'){
      try{const cot=generarCotHTML(o.cotData);mostrarVisorHTML(cot.html,(o.num||'Pedido')+' — Cotización');return;}catch(e){}
    }
    if(typeof htmlStr==='string'&&htmlStr.trim()){
      mostrarVisorHTML(htmlStr,(o.num||'Pedido')+' — Cotización');
      return;
    }
  }

  // Caso 3: hay cotData (regenerar HTML al vuelo desde datos estructurados)
  if(o.cotData && typeof generarCotHTML==='function'){
    try{
      const cot=generarCotHTML(o.cotData);
      mostrarVisorHTML(cot.html,(o.num||'Pedido')+' — Cotización');
      return;
    }catch(e){
      console.error('Error generando cotización desde cotData:',e);
      toast('Error generando PDF: '+e.message,'#c62828');
      return;
    }
  }
  
  toast('Este pedido no tiene PDF adjunto','#c62828');
}

async function comprimirImagen(file){
  if(!file.type.startsWith('image/'))return file;
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1920;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>{
          if(!b||b.size>=file.size){resolve(file);return;}
          const base=file.name.replace(/\.[^.]+$/,'');
          resolve(new File([b],base+'.jpg',{type:'image/jpeg'}));
        },'image/jpeg',0.85);
      };
      img.onerror=()=>resolve(file);
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function limpiarNombre(n){
  if(!n)return'archivo';
  const m=n.match(/^(.+?)(\.[^.]+)?$/);
  let b=m?m[1]:n;let e=m&&m[2]?m[2]:'';
  b=b.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9_-]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  e=e.toLowerCase().replace(/[^a-z0-9.]/g,'');
  if(!b)b='archivo';if(b.length>50)b=b.substring(0,50);
  return b+e;
}

// Helper compatible con Safari iPad: el input DEBE estar en el DOM y limpiarse después,
// si no, Safari descarta el onchange al volver de la cámara y "no pasa nada".
function pedirFoto(callback){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.style.position='fixed';inp.style.left='-9999px';inp.style.top='0';
  let manejado=false;
  inp.onchange=e=>{
    if(manejado)return;manejado=true;
    const file=e.target.files&&e.target.files[0];
    setTimeout(()=>{try{document.body.removeChild(inp);}catch(_){}},300);
    callback(file);
  };
  document.body.appendChild(inp);
  inp.click();
}

async function marcarEntregado(){
  const o=state.pedidoSel;if(!o)return;
  // Refrescar desde el remoto antes de validar: la firma pudo haberla subido la app
  // Entrega/Recepción después de que esta PWA cargó el pedido. Traemos lo de la nube
  // (sin merge): adoptamos los arrays remotos si existen para no quedarnos con datos viejos.
  try{
    const {data:rem}=await sb.from('orders').select('payload').eq('num',o.num).single();
    const remotoPayload=(rem&&rem.payload)?((typeof rem.payload==='string')?JSON.parse(rem.payload):rem.payload):{};
    if(remotoPayload.pdfsRecepcion)o.pdfsRecepcion=remotoPayload.pdfsRecepcion;
    if(remotoPayload.fotosTerminacion&&(!o.fotosTerminacion||remotoPayload.fotosTerminacion.length>o.fotosTerminacion.length))o.fotosTerminacion=remotoPayload.fotosTerminacion;
  }catch(rErr){console.warn('No se pudo refrescar antes de marcar entregado:',rErr);}
  const fotosTerm=o.fotosTerminacion||[];
  const _lbl=esModoAlmacen()?'entregado':'terminación';
  if(fotosTerm.length<2){
    toast('⚠ Necesitas mínimo 2 fotos de '+_lbl,'#c62828');
    render();
    return;
  }
  // Requiere firma del cliente (PDF de Entrega/Recepción en pdfsRecepcion)
  const tieneFirma=(o.pdfsRecepcion&&o.pdfsRecepcion.length>0);
  if(!tieneFirma){
    toast('⚠ Falta la firma del cliente (Entrega / Recepción de Proyecto)','#c62828');
    render();
    return;
  }
  if(!confirm('¿Confirmas que el pedido '+o.num+' ya está entregado?\n\nEsto lo marcará como Completado y desaparecerá de tu lista.'))return;
  o.estatus='Completado';
  o.entregado='Si';
  o.armado='Listo';
  o.instalacion='Listo';
  o.fechaEntregado=new Date().toISOString();
  await guardarPedido(o);
  toast('✓ Pedido marcado como entregado','#3B6D11');
  state.pedidos=state.pedidos.filter(x=>x.num!==o.num);
  volverLista();
}

async function guardarPedido(o){
  o.updated=Date.now();
  try{
    // Guardar TODO igual que ISA-OS para mantener compatibilidad bidireccional
    // IMPORTANTE: payload va como OBJETO (no JSON.stringify) porque la columna es jsonb.
    // Si se manda como string, ISA-OS no puede leer fotosAvance/fotosTerminacion.
    const update={
      payload:o,
      estatus:o.estatus||null,
      cliente:o.cliente||null,
      ejecutivo:o.comercial||o.ejecutivo||null,
      instalador:o.instaladorCel||null,
      whatsapp:o.whatsapp||null,
      ubicacion:o.ubicacion||null,
      planos:o.planos||[],
      updated_at:new Date().toISOString()
    };
    console.log('Guardando pedido',o.num,'con estatus',o.estatus);
    const {data,error}=await sb.from('orders').update(update).eq('num',o.num).select();
    if(error){
      console.error('Error guardar:',error);
      toast('⚠ Error guardando: '+error.message,'#c62828');
      return false;
    }
    if(!data||data.length===0){
      console.warn('No se actualizó ningún registro. ¿Existe num='+o.num+'?');
      toast('⚠ Pedido no encontrado en nube','#c62828');
      return false;
    }
    console.log('✓ Pedido guardado en nube:',data[0]?.num);
    return true;
  }catch(e){
    console.error('Excepción guardar:',e);
    toast('⚠ Error: '+e.message,'#c62828');
    return false;
  }
}

    render();
    await cargarPedidos();
    if(pedidoDirecto)_abrirPedidoDirecto(pedidoDirecto);
  }else{
    // Si viene con ?pedido= y no hay sesión, guardamos para abrirlo tras el login
    if(pedidoDirecto)state.pedidoPendiente=pedidoDirecto;
    state.vista='login';
    render();
  }
});

// Abre un pedido por su número, esperando a que la lista esté cargada
function _abrirPedidoDirecto(num){
  const o=state.pedidos.find(p=>p.num===num);
  if(o){abrirPedido(num);}
  else{toast('Pedido '+num+' no está en tu lista','#BA7517');}
}

// ============================================================
// Service Worker con sistema de actualización automática
// ============================================================
if('serviceWorker' in navigator){
  let updateBanner=null;
  
  // Función: mostrar banner naranja "Hay actualización"
  function mostrarBannerActualizacion(registration){
    if(updateBanner)return;
    updateBanner=document.createElement('div');
    updateBanner.style.cssText='position:fixed;top:0;left:0;right:0;background:#D85A30;color:#fff;padding:12px 16px;text-align:center;font-size:14px;font-weight:600;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;justify-content:space-between;align-items:center;gap:12px;animation:slideDown .3s ease';
    updateBanner.innerHTML='<span style="flex:1;text-align:left">🔄 Hay una nueva versión disponible</span><button id="btn-actualizar-pwa" style="background:#fff;color:#D85A30;border:none;padding:8px 16px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer">Actualizar</button>';
    document.body.appendChild(updateBanner);
    document.getElementById('btn-actualizar-pwa').addEventListener('click',async()=>{
      updateBanner.innerHTML='<span style="flex:1">Actualizando...</span>';
      // Borrar TODO el cache antes de recargar (forzar version fresca)
      try{if(window.caches){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)));}}catch(e){}
      // Pedir al SW que se active inmediatamente
      if(registration.waiting){
        registration.waiting.postMessage({type:'SKIP_WAITING'});
      }
      // Recargar la página cuando el nuevo SW tome control
      navigator.serviceWorker.addEventListener('controllerchange',()=>{
        window.location.reload();
      });
      // Failsafe: recargar después de 2 segundos por si acaso
      setTimeout(()=>window.location.reload(),2000);
    });
  }
  
  // Registrar SW
  navigator.serviceWorker.register('sw.js').then(registration=>{
    console.log('[PWA] Service Worker registrado');
    
    // Detectar cuando hay actualización disponible
    registration.addEventListener('updatefound',()=>{
      const newWorker=registration.installing;
      if(!newWorker)return;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          // Hay versión nueva esperando, mostrar banner
          console.log('[PWA] Nueva versión instalada, esperando activación');
          mostrarBannerActualizacion(registration);
        }
      });
    });
    
    // Check de actualización cada 60 segundos
    setInterval(()=>{registration.update().catch(()=>{});},60000);
    
    // Check inicial al cargar
    registration.update().catch(()=>{});
    
    // Si ya hay un SW esperando al cargar la app
    if(registration.waiting){
      mostrarBannerActualizacion(registration);
    }
  }).catch(e=>console.log('[PWA] SW failed:',e));
  
  // Escuchar cuando el SW se activa (otra pestaña pudo haberlo activado)
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return;
    refreshing=true;
    window.location.reload();
  });
}

h+=`<td style="vertical-align:bottom;width:50%;text-align:right;font-size:24px;font-weight:700;color:#D85A30">Presupuesto # ${num}</td>`;
h+=`</tr></table></div>`;

h+=`<div style="margin:10px 40px 18px;border:1px solid #d5dbe0;border-radius:10px;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:12px"><tr>`;
h+=`<td style="padding:10px 14px;border-right:1px solid #d5dbe0;width:33%"><div style="color:#888;font-size:11px">Fecha del presupuesto:</div><div style="font-weight:500;font-size:13px;margin-top:2px">${fechaFmt}</div></td>`;
h+=`<td style="padding:10px 14px;border-right:1px solid #d5dbe0;width:33%"><div style="color:#888;font-size:11px">Vencimiento</div><div style="font-weight:500;font-size:13px;margin-top:2px">${expFmt}</div></td>`;
h+=`<td style="padding:10px 14px;width:34%"><div style="color:#888;font-size:11px">Comercial</div><div style="font-weight:500;font-size:13px;margin-top:2px">${comercial||'&nbsp;'}</div></td>`;
h+=`</tr></table></div>`;

  else if(s.tipo==='nota'){h+=`<tr><td colspan="5" style="padding:6px 12px;font-style:italic;color:#888;font-size:11px;border-bottom:1px solid #eee">${s.texto||''}</td></tr>`;}
